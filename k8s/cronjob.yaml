apiVersion: batch/v1
kind: CronJob
metadata:
  name: weatherbot-cronjob
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
            - name: weatherbot
              image: <ACR_NAME>.azurecr.io/weatherbot:latest
              command: ["python", "main.py"]
              envFrom:
                - secretRef:
                    name: weatherbot-secrets
          restartPolicy: OnFailure
